<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0d1a2d"/>
      <stop offset="100%" stop-color="#070e1b"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <text x="50" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="700" letter-spacing="-2" fill="#00f0ff" filter="url(#glow)">AR</text>
</svg>
